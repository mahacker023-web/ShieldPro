name: Build ShieldPro Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish Single-File Executable
      run: dotnet publish AppBlocker.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

    - name: Upload Exe Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ShieldPro-Executable
        path: bin/Release/net8.0-windows/win-x64/publish/AppBlocker.exe
